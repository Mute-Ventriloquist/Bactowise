# BactoWise — bundled pipeline configuration
#
# This file is managed by BactoWise. Do not edit it manually.
# It was installed to ~/.bactowise/config/pipeline.yaml by BactoWise.
#
# To reset this file to the version bundled with your installed BactoWise:
#   bactowise init --reset
#
# To see what version of BactoWise installed this file:
#   bactowise --version

tools:

  - name: checkm
    version: "1.2.3"
    runtime: conda
    role: qc
    conda_env:
      name: "checkm_env"
      channels:
        - conda-forge
        - bioconda
        - defaults
      dependencies: []
    qc_criteria:
      completeness: 95.0
      contamination: 5.0
    params:
      mode: taxonomy_wf
      rank: domain
      taxon: Bacteria
      threads: 4

  - name: prokka
    version: "1.14.6"
    runtime: conda
    depends_on: [checkm]
    conda_env:
      name: "prokka_env"
      channels:
        - conda-forge
        - bioconda
        - defaults
      dependencies: []
    params:
      genus: "Mycoplasma"
      species: "genitalium"
      kingdom: Bacteria
      cpus: 4

  - name: bakta
    version: "1.12.0"
    runtime: singularity
    depends_on: [checkm]
    image: "oschwengers/bakta:v1.12.0"
    database:
      path: "~/.bactowise/databases/bakta/db-light"
      type: light
    params:
      min-contig-length: 200
      threads: 4

# ── PGAP prerequisite ─────────────────────────────────────────────────────────
# pgap.py and its supplemental data are downloaded automatically on first run,
# or explicitly with: bactowise db download --pgap
# The only external requirement is a container runtime (Singularity or Docker).

  - name: pgap
    version: "2024-07-18.build7555"
    runtime: pgap
    depends_on: [checkm]
    params:
      organism: "Mycoplasmoides genitalium"   # required — genus or genus species
      threads: 4                              # optional — default: 1
      report_usage: false                     # optional — false = pass -n to pgap.py
      # pgap_input_dir: override default ~/.bactowise/databases/pgap/ if needed

output_dir: "./results"
threads: 4
