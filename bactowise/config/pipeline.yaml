# BactoWise — bundled pipeline configuration
#
# This file is managed by BactoWise. Do not edit it manually.
# It was installed to ~/.bactowise/config/pipeline.yaml by BactoWise.
#
# To reset this file to the version bundled with your installed BactoWise:
#   bactowise init --reset
#
# To see what version of BactoWise installed this file:
#   bactowise --version

tools:

  - name: checkm
    version: "1.2.3"
    runtime: conda
    role: qc
    conda_env:
      name: "checkm_env"
      channels:
        - conda-forge
        - bioconda
        - defaults
      dependencies: []
    database:
      path: "~/.bactowise/databases/checkm"
    qc_criteria:
      completeness: 95.0
      contamination: 5.0
    params:
      mode: taxonomy_wf   # taxonomy_wf (default, ~2 GB db) or lineage_wf (more accurate, ~40 GB db)
      rank: domain        # used by taxonomy_wf — 'domain' is correct for bacteria
      taxon: Bacteria     # used by taxonomy_wf — set to your domain/phylum/class as needed
      threads: 4

  - name: prokka
    version: "1.14.6"
    runtime: conda
    depends_on: [checkm]
    conda_env:
      name: "prokka_env"
      channels:
        - conda-forge
        - bioconda
        - defaults
      dependencies: []
    params:
      # genus and species are optional — Prokka uses its general bacterial
      # database when omitted, which works for any organism. Specifying them
      # improves gene naming accuracy when the organism is known.
      # genus: "Mycoplasma"
      # species: "genitalium"
      kingdom: Bacteria   # set to Viruses or Archaea if appropriate
      cpus: 4

  - name: bakta
    version: "1.12.0"
    runtime: singularity
    depends_on: [checkm]
    image: "oschwengers/bakta:v1.12.0"
    database:
      path: "~/.bactowise/databases/bakta/db-light"
      type: light
    params:
      min-contig-length: 200
      threads: 4

# ── PGAP ──────────────────────────────────────────────────────────────────────
# pgap.py and its supplemental data are downloaded automatically on first run,
# or explicitly with: bactowise db download --pgap
# The only external requirement is a container runtime (Singularity or Docker).
#
# organism is required by PGAP — set it to the genus or genus species of your
# input genome. This does not need to be an exact NCBI taxonomy match.

  - name: pgap
    version: "2024-07-18.build7555"
    runtime: pgap
    depends_on: [checkm]
    params:
      # organism is passed via -n/--organism on the command line — not here.
      report_usage: false    # false = pass -n to pgap.py (no anonymous usage reporting)
      # pgap_input_dir: "~/.bactowise/databases/pgap"  # override default data dir if needed

# ── Consensus Engine (Stage 3) ────────────────────────────────────────────────
# The BactoWise Consensus Engine merges annotations from Bakta, Prokka, and
# PGAP into a single consensus source of truth.
#
# It depends on all three stage 2 annotation tools. BactoWise automatically
# collects their outputs, stages them with tool-name-prefixed filenames, and
# invokes the engine via 'conda run -n consensus_env python consensus_engine.py'.
#
# The consensus_env conda environment is created automatically on first run.
# It requires only pandas and openpyxl (for .xlsx output).

  - name: consensus
    version: "1.0.0"
    runtime: conda
    depends_on: [bakta, prokka, pgap]
    conda_env:
      name: "consensus_env"
      channels:
        - conda-forge
        - defaults
      dependencies:
        - pandas
        - openpyxl

output_dir: "./results"
threads: 4
