# BactoWise — bundled pipeline configuration
#
# This file is managed by BactoWise. Do not edit it manually.
# It was installed to ~/.bactowise/config/pipeline.yaml by BactoWise.
#
# To reset this file to the version bundled with your installed BactoWise:
#   bactowise init --reset
#
# To see what version of BactoWise installed this file:
#   bactowise --version

tools:

  # ── Stage 1: QC (skippable with --skip stage_1) ──────────────────────────

  - name: checkm
    version: "1.2.3"
    runtime: conda
    role: qc
    conda_env:
      name: "checkm_env"
      channels:
        - conda-forge
        - bioconda
        - defaults
      dependencies: []
    database:
      path: "~/.bactowise/databases/checkm"
    qc_criteria:
      completeness: 95.0
      contamination: 5.0
    params:
      mode: taxonomy_wf   # taxonomy_wf (default, ~2 GB db) or lineage_wf (more accurate, ~40 GB db)
      rank: domain        # used by taxonomy_wf — 'domain' is correct for bacteria
      taxon: Bacteria     # used by taxonomy_wf — set to your domain/phylum/class as needed
      threads: 4

  # ── Stage 2: Annotation ───────────────────────────────────────────────────

  - name: prokka
    version: "1.14.6"
    runtime: conda
    depends_on: [checkm]
    conda_env:
      name: "prokka_env"
      channels:
        - conda-forge
        - bioconda
        - defaults
      dependencies: []
    params:
      # genus and species are optional — Prokka uses its general bacterial
      # database when omitted, which works for any organism. Specifying them
      # improves gene naming accuracy when the organism is known.
      # genus: "Mycoplasma"
      # species: "genitalium"
      kingdom: Bacteria   # set to Viruses or Archaea if appropriate
      cpus: 4

  - name: bakta
    version: "1.12.0"
    runtime: singularity
    depends_on: [checkm]
    image: "oschwengers/bakta:v1.12.0"
    database:
      path: "~/.bactowise/databases/bakta/db-full"
      type: full
    params:
      min-contig-length: 200
      threads: 4

  # pgap.py and its supplemental data are downloaded automatically on first run,
  # or explicitly with: bactowise db download --pgap
  # The only external requirement is a container runtime (Singularity or Docker).
  # organism is passed via -n/--organism on the command line — not here.

  - name: pgap
    version: "2024-07-18.build7555"
    runtime: pgap
    depends_on: [checkm]
    params:
      report_usage: false    # false = pass -n to pgap.py (no anonymous usage reporting)
      # pgap_input_dir: "~/.bactowise/databases/pgap"  # override default data dir if needed

  # ── Stage 3: Consensus Engine ─────────────────────────────────────────────
  # Merges Bakta, Prokka, and PGAP annotations into a single source of truth.
  # Invoked via: conda run -n consensus_env python consensus_engine.py
  # The consensus_env is created automatically on first run.

  - name: consensus
    version: "1.0.0"
    runtime: conda
    depends_on: [bakta, prokka, pgap]
    conda_env:
      name: "consensus_env"
      channels:
        - conda-forge
        - defaults
      dependencies:
        - pandas
        - openpyxl

  # ── Stage 4: Supplementary Annotations (skippable with --skip stage_4) ───

  # Phigaro — prophage region detection.
  # Detects prophage regions directly from the genome FASTA using Prodigal
  # for ORF calling and pVOG HMM profiles for phage gene annotation.
  # No stage 2/3 outputs required — all gene calling is done internally.
  # phigaro-setup runs automatically on first use to download pVOG HMMs.

  - name: phigaro
    version: "latest"
    runtime: conda
    depends_on: [consensus]
    conda_env:
      name: "phigaro_env"
      channels:
        - conda-forge
        - bioconda
        - defaults
      dependencies: []
    params:
      # threads: 4   # defaults to global threads

  # Platon — plasmid contig classification and characterization.
  # Identifies plasmid-borne contigs from the genome FASTA using replicon
  # distribution scores (RDS) and comprehensive contig characterization.
  # Database (~2.8 GB) downloaded automatically to ~/.bactowise/databases/platon/db/
  # Optional params:
  #   mode    : sensitivity | accuracy | specificity  (default: accuracy)
  #   threads : override global thread count

  - name: platon
    version: "latest"
    runtime: conda
    depends_on: [consensus]
    conda_env:
      name: "platon_env"
      channels:
        - conda-forge
        - bioconda
        - defaults
      dependencies: []
    params:
      mode: accuracy
      # threads: 4   # defaults to global threads

  # MobileElementFinder — transposon, IS element, and integron detection.
  # Identifies mobile genetic elements by aligning contigs against a curated
  # MGE reference database bundled with the pip package.
  # Dependencies: blast and kma installed via conda; MobileElementFinder via pip.

  - name: mefinder
    version: "latest"
    runtime: conda
    depends_on: [consensus]
    conda_env:
      name: "mefinder_env"
      channels:
        - conda-forge
        - bioconda
        - defaults
      dependencies: []
    params:
      # threads: 4   # defaults to global threads

  # EggNOG-mapper — GO terms, KEGG pathways, and COG functional annotation.
  # Input: consensus/GENE.faa (stage 3 protein FASTA — intentional, to annotate
  # every consensus gene identified across Bakta, Prokka, and PGAP).
  # Database (~20 GB) downloaded automatically to ~/.bactowise/databases/eggnog/
  # Optional params:
  #   tax_scope   : Bacteria (default) | Archaea | Eukaryota | Viruses
  #   go_evidence : all (default) | experimental | non-experimental
  #   threads     : override global thread count

  - name: eggnogmapper
    version: "latest"
    runtime: conda
    depends_on: [consensus]
    conda_env:
      name: "eggnogmapper_env"
      channels:
        - conda-forge
        - bioconda
        - defaults
      dependencies: []
    params:
      tax_scope: Bacteria
      go_evidence: all
      # threads: 4   # defaults to global threads

  # AMRFinderPlus — antimicrobial resistance genes and point mutations.
  # Runs in nucleotide-only mode: amrfinder -n <genome.fasta> --plus
  #
  # Optional params:
  #   organism : AMRFinderPlus taxon name for point mutation detection.
  #              Must be a value from `amrfinder --list_organisms`.
  #              Examples: Escherichia, Salmonella, Staphylococcus_aureus
  #              Omit entirely if the organism is not in the supported list.
  #   plus     : include virulence/stress/biocide genes (default: true)
  #   threads  : override global thread count for this tool

  - name: amrfinderplus
    version: "latest"
    runtime: conda
    depends_on: [consensus]
    conda_env:
      name: "amrfinderplus_env"
      channels:
        - conda-forge
        - bioconda
        - defaults
      dependencies: []
    params:
      plus: true
      # organism: "Escherichia"   # uncomment for point mutation detection
      # threads: 4                # defaults to global threads

  # SPIFinder — Salmonella Pathogenicity Island detection.
  # Only runs when -n/--organism genus is Salmonella — silently skipped otherwise.
  # No Docker image exists; tool and database are git-cloned from Bitbucket on
  # first run to ~/.bactowise/databases/spifinder/.
  #
  # Optional params:
  #   min_cov   : minimum coverage threshold 0–1 (default: 0.60)
  #   threshold : minimum identity threshold 0–1 (default: 0.95)

  - name: spifinder
    version: "latest"
    runtime: conda
    depends_on: [consensus]
    conda_env:
      name: "spifinder_env"
      channels:
        - conda-forge
        - bioconda
        - defaults
      dependencies:
        - python=3.11   # distutils was removed in 3.12; spifinder.py requires it
    params:
      min_cov: 0.60
      threshold: 0.95

output_dir: "./results"
threads: 4
