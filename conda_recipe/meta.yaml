package:
  name: bactowise
  version: "0.1.0"

source:
  path: ..

build:
  number: 0
  script: pip install . -vv
  entry_points:
    - bactowise = bactowise.cli:main

requirements:
  host:
    - python >=3.10,<3.13
    - pip
    - hatchling
  run:
    - python >=3.10,<3.13
    - pyyaml >=6.0
    - pydantic >=2.0
    - typer >=0.9

test:
  script: run_tests.sh
  requires:
    - pytest

extra:
  channels:
    - bioconda
    - conda-forge
