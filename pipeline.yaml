# pipeline.yaml
# Annotate M. genitalium G37 with Prokka and Bakta simultaneously.
#
# Before running:
#   Download the Bakta light database (one-time, ~2 GB):
#     bakta_db download --output ~/bakta_db --type light
#
# Everything else (conda env creation, Docker image pulling) happens
# automatically on first run.
#
# Usage:
#   genoflow -f mgenitalium_G37.fasta -c pipeline.yaml

tools:

  - name: prokka
    version: "1.14.6"
    runtime: conda
    conda_env:
      name: "prokka_env"
      channels:
        - bioconda
        - conda-forge
      dependencies:
        - python=3.8      # prokka needs python 3.8 to resolve its Perl deps cleanly
    params:
      genus: "Mycoplasma"
      species: "genitalium"
      kingdom: Bacteria
      cpus: 4

  - name: bakta
    version: "1.12.0"
    runtime: docker
    image: "oschwengers/bakta:v1.12.0"   # pulled automatically on first run
    database:
      path: "/home/venkateswaran/projects/genoflow/test_data/db-light"
      type: light
    params:
      min-contig-length: 200
      threads: 4

output_dir: "./results"
threads: 4

