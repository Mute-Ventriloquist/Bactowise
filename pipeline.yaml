# pipeline.yaml
# Annotate M. genitalium G37 with Prokka and Bakta simultaneously,
# preceded by a CheckM genome quality assessment.
#
# FIRST-TIME SETUP
# ----------------
# 1. Download all required databases (one-time, ~4 GB total):
#      bactowise db download
#
#    This stores databases under ~/.bactowise/databases/ and the default
#    paths below will work without any edits.
#
#    To force a re-download (e.g. to update the database):
#      bactowise db download --force-db-download
#
# 2. Everything else (conda env creation, Docker image pulling, checkm
#    data setRoot) happens automatically on first run.
#
# Usage:
#   bactowise run -f mgenitalium_G37.fasta -c pipeline.yaml

tools:

  - name: checkm
    version: "1.2.3"
    runtime: conda
    role: qc
    conda_env:
      name: "checkm_env"
      channels:
        - bioconda
        - conda-forge
      dependencies:
        - python=3.8
    database:
      path: "~/.bactowise/databases/checkm"   # populated by: bactowise db download
    qc_criteria:
      completeness: 95.0              # optional — default 95.0
      contamination: 5.0              # optional — default 5.0
    params:
      # All params below are optional — CheckM runs fine without them
      mode: taxonomy_wf               # optional — default: taxonomy_wf
      rank: domain                    # optional — default: domain
      taxon: Bacteria                 # optional — default: Bacteria
      threads: 4                      # optional — default: 1

  - name: prokka
    version: "1.14.6"
    runtime: conda
    depends_on: [checkm]
    conda_env:
      name: "prokka_env"
      channels:
        - bioconda
        - conda-forge
      dependencies:
        - python=3.8
    params:
      # All params below are optional
      genus: "Mycoplasma"             # optional — improves gene naming
      species: "genitalium"           # optional — improves gene naming
      kingdom: Bacteria               # optional — default: Bacteria
      cpus: 4                         # optional — default: 1

  - name: bakta
    version: "1.12.0"
    runtime: singularity
    depends_on: [checkm]
    image: "oschwengers/bakta:v1.12.0"
    database:
      path: "~/.bactowise/databases/bakta/db-light"  # populated by: bactowise db download
      type: light
    params:
      # All params below are optional
      min-contig-length: 200          # optional — default: 1
      threads: 4                      # optional — default: 1

# ── PGAP (commented out — uncomment once prerequisites are in place) ──────────
#
# Prerequisites (one-time, done outside BactoWise):
#   1. Download pgap.py and put it on PATH:
#        curl -OL https://github.com/ncbi/pgap/raw/prod/scripts/pgap.py
#        chmod +x pgap.py && mv pgap.py ~/.local/bin/
#
#   2. Download the supplemental data (~30 GB, ~100 GB working space needed):
#        pgap.py --update
#
#   3. Ensure Singularity or Docker is available on PATH.
#
# Once the above are done, uncomment this block and re-run.
#
#  - name: pgap
#    version: "2024-07-18.build7555"
#    runtime: pgap
#    depends_on: [checkm]
#    params:
#      organism: "Mycoplasmoides genitalium"   # required — genus or genus species
#      threads: 4                              # optional — default: 1
#      report_usage: false                     # optional — false = pass -n to pgap.py
#      # pgap_input_dir: "~/.pgap"            # optional — override default data dir

output_dir: "./results"
threads: 4
